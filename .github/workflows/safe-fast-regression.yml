name: SAFE-FAST Regression

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "requirements.txt"
      - "SAFE_FAST_BUILD_STATE.md"
      - "replay/**"
      - ".github/workflows/safe-fast-regression.yml"

jobs:
  safe-fast-regression:
    name: Run SAFE-FAST replay and contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Continuation reason-priority contract
        run: python replay/test_on_demand_continuation_reason_priority_contract.py

      - name: Verify valid shelf is not chop
        run: python replay/test_on_demand_valid_shelf_not_chop_contract.py

      - name: Verify room caution / cramped first-wall contract
        run: python replay/test_on_demand_room_caution_contract.py

      - name: Verify wall thesis fit contract
        run: python replay/test_on_demand_wall_thesis_fit_contract.py

      - name: Verify extension caution contract
        run: python replay/test_on_demand_extension_caution_contract.py

      - name: Verify 24H response surface contract
        run: python replay/test_on_demand_24h_response_surface_contract.py

      - name: Verify 24H surface contract
        run: python replay/test_on_demand_24h_surface_contract.py

      - name: Verify 24H caution contract
        run: python replay/test_on_demand_24h_caution_contract.py

      - name: Verify setup classifier contract
        run: python replay/test_on_demand_classifier_contract.py

      - name: Verify stage-message contract
        run: python replay/test_on_demand_stage_messages.py

      - name: Validate replay fixtures
        run: python replay/validate_fixtures.py

      - name: Run replay regression
        run: python replay/run_replay.py
