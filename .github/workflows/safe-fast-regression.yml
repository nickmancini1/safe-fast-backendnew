name: SAFE-FAST Regression

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "main.py"
      - "requirements.txt"
      - "SAFE_FAST_BUILD_STATE.md"
      - "replay/**"
      - ".github/workflows/safe-fast-regression.yml"

jobs:
  safe-fast-regression:
    name: Run SAFE-FAST replay and contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify all on-demand contract tests
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          tests = sorted(Path("replay").glob("test_on_demand_*contract.py"))

          if not tests:
              print("No on-demand contract tests found.")
              sys.exit(2)

          for test in tests:
              print(f"RUNNING {test}")
              result = subprocess.run([sys.executable, str(test)])
              if result.returncode != 0:
                  sys.exit(result.returncode)

          print(f"ON-DEMAND CONTRACT SWEEP PASS | count={len(tests)}")
          PY

      - name: Verify stage-message contract
        run: python replay/test_on_demand_stage_messages.py

      - name: Validate replay fixtures
        run: python replay/validate_fixtures.py

      - name: Run replay regression
        run: python replay/run_replay.py